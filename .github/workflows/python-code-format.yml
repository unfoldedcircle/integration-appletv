name: Check Python code formatting

on:
  push:
    # always check code formatting in all feature branches
    branches-ignore:
      - l10n
    paths:
      - 'intg-appletv/**'
      - 'requirements.txt'
      - 'test-requirements.txt'
      - 'tests/**'
      - '.github/**/*.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# prevent concurrent runs of this workflow for open pull requests
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    name: Check Python code formatting
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: |
          python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then .venv/bin/pip install -r requirements.txt; fi
          if [ -f test-requirements.txt ]; then .venv/bin/pip install -r test-requirements.txt; fi
      - name: Lint with ruff
        run: |
          .venv/bin/python -m ruff check intg-appletv
      - name: Check code formatting with ruff
        run: |
          .venv/bin/python -m ruff format --check intg-appletv
      - name: Type check with pyright
        run: |
          .venv/bin/python -m pyright
